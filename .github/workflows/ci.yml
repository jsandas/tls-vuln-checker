name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    permissions:
      contents: read
    uses: jsandas/github-actions/.github/workflows/golang-lint.yml@13150b57906d67e1731f602c2b78a5d13b13b1bc

  security:
    permissions:
      contents: read
      security-events: write
    uses: jsandas/github-actions/.github/workflows/golang-security.yml@13150b57906d67e1731f602c2b78a5d13b13b1bc

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint]
    
    steps:
      - uses: actions/checkout@v6.0.2
        
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run unit tests
        run: go test ./... -skip TestWeakKey -coverprofile=coverage.out

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false
